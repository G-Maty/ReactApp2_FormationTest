version: 1
backend:
  phases:
    build:
      commands:
        - export USER_POOL_ID=$(aws ssm get-parameter --name /app/common/cognito/userPoolId --query Parameter.Value --output text --region ap-northeast-1)
        - export USER_POOL_CLIENT_ID=$(aws ssm get-parameter --name /app/common/cognito/userPoolClientId-user --query Parameter.Value --output text --region ap-northeast-1)
        - npm ci
        - npm install --legacy-peer-deps @aws-amplify/backend@^1.0.0 @aws-amplify/backend-cli@^1.0.0
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - node scripts/patch-amplify-outputs.js
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
